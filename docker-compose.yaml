x-php-service: &php-service
  image: klinomania-backend-app:latest
  env_file:
    - .env
  environment: &php-environment
    APP_ENV: production
    APP_DEBUG: "false"
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: 5432
    DB_DATABASE: ${DB_DATABASE:-klinomania_backend}
    DB_USERNAME: ${DB_USERNAME:-klinomania}
    DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    CACHE_STORE: database
    QUEUE_CONNECTION: database
    SESSION_DRIVER: database
    FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase.json
  restart: unless-stopped
  init: true
  depends_on:
    postgres:
      condition: service_healthy
  volumes:
    - app_storage:/var/www/html/storage
    - ${FIREBASE_CREDENTIALS_HOST_PATH:-/var/www/klinomania-secrets/firebase.json}:/run/secrets/firebase.json:ro

services:
  app:
    <<: *php-service
    build:
      context: .
      target: app
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: klinomania-backend-web:latest
    build:
      context: .
      target: nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - app_storage:/var/www/html/storage:ro

  queue:
    <<: *php-service
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90 --max-time=3600
    stop_grace_period: 2m

  scheduler:
    <<: *php-service
    command: php artisan schedule:work

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-klinomania_backend}
      POSTGRES_USER: ${DB_USERNAME:-klinomania}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  app_storage:
  postgres_data:
