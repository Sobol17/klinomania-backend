openapi: 3.1.0
info:
  title: Klinomania Mobile API
  version: 0.1.0
  description: API v1 for Klinomania cleaning mobile applications.
servers:
  - url: /api/v1
security: []
tags:
  - name: Client Auth
  - name: Cleaner Auth
  - name: Services
  - name: Client Orders
  - name: Cleaner Orders
  - name: Profiles
paths:
  /client/auth/request-code:
    post:
      tags: [Client Auth]
      summary: Request client SMS code
      description: Creates an OTP record and sends a random 4-digit SMS code. A fixed dev code can be enabled explicitly via configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneRequest'
            examples:
              default:
                value:
                  phone: '+79990000001'
      responses:
        '200':
          description: Code sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                default:
                  value:
                    message: Code sent.
        '422':
          $ref: '#/components/responses/ValidationError'
  /client/auth/verify-code:
    post:
      tags: [Client Auth]
      summary: Verify client SMS code
      description: Verifies a 4-digit code, creates the client user after success, and returns a Sanctum token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientVerifyCodeRequest'
            examples:
              default:
                value:
                  phone: '+79990000001'
                  code: '4829'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /cleaner/auth/login:
    post:
      tags: [Cleaner Auth]
      summary: Login cleaner
      description: Authenticates a cleaner by phone and 6-digit code. In dev mode the code is 111111.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanerLoginRequest'
            examples:
              default:
                value:
                  phone: '+79990000003'
                  code: '111111'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /services:
    get:
      tags: [Services]
      summary: List active cleaning services
      responses:
        '200':
          description: Active services
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CleaningService'
  /client/home-summary:
    get:
      tags: [Services]
      summary: Get active order summary for client home screen
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Active order summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/HomeSummary'
  /client/services:
    get:
      tags: [Services]
      summary: List active client services
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Service catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/ClientService'}
  /client/services/{serviceId}:
    get:
      tags: [Services]
      summary: Get a service configuration
      security: [{bearerAuth: []}]
      parameters:
        - name: serviceId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Service configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: {$ref: '#/components/schemas/ClientServiceDetail'}
        '404': {$ref: '#/components/responses/NotFound'}
  /client/service-quotes:
    post:
      tags: [Services]
      summary: Calculate a server-side service quote
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateServiceQuoteRequest'}
      responses:
        '200':
          description: Quote created
          content:
            application/json:
              schema:
                type: object
                properties: {data: {$ref: '#/components/schemas/ServiceQuote'}}
        '422': {$ref: '#/components/responses/ValidationError'}
  /client/orders:
    post:
      tags: [Client Orders]
      summary: Create an order from a quote
      security: [{bearerAuth: []}]
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateQuotedOrderRequest'}
      responses:
        '201': {description: Created order}
        '200': {description: Idempotent replay}
        '409': {$ref: '#/components/responses/Conflict'}
        '410': {description: Quote expired}
  /client/profile:
    get:
      tags: [Profiles]
      summary: Get client profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Client profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      tags: [Profiles]
      summary: Update client profile
      description: Partially updates editable client profile fields. All request fields are optional. Phone is not changed by this endpoint.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientProfileRequest'
            examples:
              default:
                value:
                  name: Иван
                  email: ivan@example.com
                  address: Москва, ул. Тверская, 1
                  push_notifications_enabled: true
                  email_marketing_enabled: false
      responses:
        '200':
          description: Updated client profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /cleaner/profile:
    get:
      tags: [Profiles]
      summary: Get cleaner profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cleaner profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /client/orders:
    get:
      tags: [Client Orders]
      summary: List current client's orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Client orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningOrderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /client/orders/checkout:
    post:
      tags: [Client Orders]
      summary: Create cleaning order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: Created order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /cleaner/orders/available:
    get:
      tags: [Cleaner Orders]
      summary: List pending orders available to cleaners
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Available orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningOrderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /cleaner/orders/history:
    get:
      tags: [Cleaner Orders]
      summary: List completed orders for current cleaner
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Completed orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningOrderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /cleaner/orders/{order}/accept:
    post:
      tags: [Cleaner Orders]
      summary: Accept pending order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Accepted order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /cleaner/orders/{order}/start:
    post:
      tags: [Cleaner Orders]
      summary: Start accepted order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: In-progress order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /cleaner/orders/{order}/complete:
    post:
      tags: [Cleaner Orders]
      summary: Complete in-progress order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Completed order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    OrderId:
      name: order
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
  responses:
    Unauthorized:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                message: Unauthenticated.
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Invalid order state transition
      content:
        application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  schemas:
    HomeSummary:
      type: object
      required: [active_orders_count, active_order_status, active_order_status_label]
      properties:
        active_orders_count: {type: integer, minimum: 0}
        active_order_status: {type: [string, 'null']}
        active_order_status_label: {type: [string, 'null']}
    ClientService:
      type: object
      required: [id, slug, title, cleaners_label, duration_label, gallery]
      properties:
        id: {type: string}
        slug: {type: string}
        title: {type: string}
        subtitle: {type: [string, 'null']}
        short_description: {type: [string, 'null']}
        cleaners_label: {type: string}
        duration_label: {type: string}
        price_from: {type: integer}
        image_url: {type: [string, 'null'], format: uri}
        gallery: {type: array, items: {type: string, format: uri}}
    ServiceOption:
      type: object
      required: [id, title, is_addon, default, price_modifier, sort_order]
      properties:
        id: {type: string}
        title: {type: string}
        subtitle: {type: [string, 'null']}
        is_addon: {type: boolean}
        default: {type: boolean}
        price_modifier: {type: integer}
        sort_order: {type: integer}
    ClientServiceDetail:
      allOf:
        - $ref: '#/components/schemas/ClientService'
        - type: object
          properties:
            description: {type: [string, 'null']}
            pricing: {type: object}
            room_options: {type: array, items: {$ref: '#/components/schemas/ServiceOption'}}
            cleaning_options: {type: array, items: {$ref: '#/components/schemas/ServiceOption'}}
            extra_options: {type: array, items: {$ref: '#/components/schemas/ServiceOption'}}
    CreateServiceQuoteRequest:
      type: object
      required: [service_id, area_sqm, room_option_id, cleaning_option_id]
      properties:
        service_id: {type: string}
        area_sqm: {type: integer, minimum: 1}
        room_option_id: {type: string}
        cleaning_option_id: {type: string}
        extra_option_ids: {type: array, items: {type: string}}
    ServiceQuote:
      type: object
      properties:
        quote_id: {type: string}
        service_id: {type: string}
        currency: {type: string, example: RUB}
        area_sqm: {type: integer}
        line_items: {type: array, items: {type: object}}
        subtotal: {type: integer}
        discount: {type: integer}
        total_price: {type: integer}
        expires_at: {type: string, format: date-time}
    CreateQuotedOrderRequest:
      type: object
      required: [quote_id, address, scheduled_at]
      properties:
        quote_id: {type: string}
        scheduled_at: {type: string, format: date-time}
        payment_method: {type: ['null', string]}
        address: {type: object}
    PhoneRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          maxLength: 32
          example: '+79990000001'
    ClientVerifyCodeRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
          maxLength: 32
        code:
          type: string
          pattern: '^\d{4}$'
          example: '4829'
    CleanerLoginRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
          maxLength: 32
        code:
          type: string
          pattern: '^\d{6}$'
          example: '111111'
    UpdateClientProfileRequest:
      type: object
      properties:
        name:
          type:
            - string
            - 'null'
          maxLength: 255
        email:
          type:
            - string
            - 'null'
          format: email
          maxLength: 255
        address:
          type:
            - string
            - 'null'
          maxLength: 255
        push_notifications_enabled:
          type: boolean
        email_marketing_enabled:
          type: boolean
    CheckoutRequest:
      type: object
      required: [cleaning_service_id, address]
      properties:
        cleaning_service_id:
          type: integer
          minimum: 1
        address:
          type: string
          maxLength: 255
        scheduled_at:
          type:
            - string
            - 'null'
          format: date-time
        comment:
          type:
            - string
            - 'null'
          maxLength: 2000
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    AuthTokenResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
    CleaningOrderResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/CleaningOrder'
    CleaningOrderListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CleaningOrder'
    User:
      type: object
      required: [id, role]
      properties:
        id:
          type: integer
        name:
          type:
            - string
            - 'null'
        email:
          type:
            - string
            - 'null'
          format: email
        phone:
          type:
            - string
            - 'null'
          readOnly: true
        role:
          type: string
          enum: [client, cleaner, admin]
        client_profile:
          oneOf:
            - $ref: '#/components/schemas/ClientProfile'
            - type: 'null'
        cleaner_profile:
          oneOf:
            - $ref: '#/components/schemas/CleanerProfile'
            - type: 'null'
    ClientProfile:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type:
            - string
            - 'null'
        address:
          type:
            - string
            - 'null'
        push_notifications_enabled:
          type: boolean
        email_marketing_enabled:
          type: boolean
    CleanerProfile:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type:
            - string
            - 'null'
        is_active:
          type: boolean
    CleaningService:
      type: object
      required: [id, name, base_price, is_active]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type:
            - string
            - 'null'
        base_price:
          type: integer
          minimum: 0
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CleaningOrder:
      type: object
      required: [id, client_id, cleaning_service_id, status, address, total_price]
      properties:
        id:
          type: integer
        client_id:
          type: integer
        cleaner_id:
          type:
            - integer
            - 'null'
        cleaning_service_id:
          type: integer
        status:
          type: string
          enum: [pending, accepted, in_progress, completed, cancelled]
        address:
          type: string
        scheduled_at:
          type:
            - string
            - 'null'
          format: date-time
        comment:
          type:
            - string
            - 'null'
        total_price:
          type: integer
          minimum: 0
        service:
          oneOf:
            - $ref: '#/components/schemas/CleaningService'
            - type: 'null'
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    ValidationErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
