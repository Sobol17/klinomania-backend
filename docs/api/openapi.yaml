openapi: 3.1.0
info:
  title: Klinomania Mobile API
  version: 0.1.0
  description: API v1 for Klinomania cleaning mobile applications.
servers:
  - url: /api/v1
security: []
tags:
  - name: Client Auth
  - name: Cleaner Auth
  - name: Services
  - name: Client Orders
  - name: Cleaner Orders
  - name: Payments
  - name: Profiles
  - name: Push Notifications
paths:
  /client/auth/request-code:
    post:
      tags: [Client Auth]
      summary: Request client SMS code
      description: Creates an OTP record and sends a random 4-digit SMS code. A fixed dev code can be enabled explicitly via configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneRequest'
            examples:
              default:
                value:
                  phone: '+79990000001'
      responses:
        '200':
          description: Code sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                default:
                  value:
                    message: Code sent.
        '422':
          $ref: '#/components/responses/ValidationError'
  /client/auth/verify-code:
    post:
      tags: [Client Auth]
      summary: Verify client SMS code
      description: Verifies a 4-digit code, creates the client user after success, and returns a Sanctum token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientVerifyCodeRequest'
            examples:
              default:
                value:
                  phone: '+79990000001'
                  code: '4829'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /cleaner/auth/login:
    post:
      tags: [Cleaner Auth]
      summary: Login cleaner
      description: Authenticates a cleaner by phone and 6-digit code. In dev mode the code is 111111.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanerLoginRequest'
            examples:
              default:
                value:
                  phone: '+79990000003'
                  code: '111111'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /services:
    get:
      tags: [Services]
      summary: List active cleaning services
      responses:
        '200':
          description: Active services
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CleaningService'
  /client/home-summary:
    get:
      tags: [Services]
      summary: Get active order summary for client home screen
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Active order summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/HomeSummary'
  /client/services:
    get:
      tags: [Services]
      summary: List active client services
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Service catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/ClientService'}
  /client/services/{serviceId}:
    get:
      tags: [Services]
      summary: Get a service configuration
      security: [{bearerAuth: []}]
      parameters:
        - name: serviceId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Service configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: {$ref: '#/components/schemas/ClientServiceDetail'}
        '404': {$ref: '#/components/responses/NotFound'}
  /client/profile:
    get:
      tags: [Profiles]
      summary: Get client profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Client profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      tags: [Profiles]
      summary: Update client profile
      description: Partially updates editable client profile fields. All request fields are optional. Phone is not changed by this endpoint.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientProfileRequest'
            examples:
              default:
                value:
                  name: Иван
                  email: ivan@example.com
                  address: Москва, ул. Тверская, 1
                  push_notifications_enabled: true
                  email_marketing_enabled: false
      responses:
        '200':
          description: Updated client profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /cleaner/profile:
    get:
      tags: [Profiles]
      summary: Get cleaner profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cleaner profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /client/orders:
    get:
      tags: [Client Orders]
      summary: List current client's orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Client orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningOrderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Client Orders]
      summary: Create a cleaning order
      security: [{bearerAuth: []}]
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateOrderRequest'}
      responses:
        '201':
          description: Created order
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CreateOrderResponse'}
        '200': {description: Idempotent replay}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {$ref: '#/components/responses/Conflict'}
        '422': {$ref: '#/components/responses/ValidationError'}
        '429': {description: Order creation rate limit exceeded}
  /client/push-token:
    post:
      tags: [Push Notifications]
      summary: Register the current client's Firebase Cloud Messaging token
      description: Stores the current client's last active FCM token. Register it after authentication and whenever Firebase refreshes the token. Delivery is controlled by the client's push_notifications_enabled preference.
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PushTokenRequest'}
      responses:
        '204': {description: Token stored}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '422': {$ref: '#/components/responses/ValidationError'}
  /cleaner/orders/available:
    get:
      tags: [Cleaner Orders]
      summary: List confirmed orders with an incomplete team
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Available orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningOrderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /cleaner/orders:
    get:
      tags: [Cleaner Orders]
      summary: List current cleaner's orders after confirmation
      description: Returns the current cleaner's team_formed, in_progress, awaiting_payment, and completed orders.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cleaner orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningOrderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /cleaner/orders/history:
    get:
      tags: [Cleaner Orders]
      summary: List orders whose cleaning work is finished for current cleaner
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Orders awaiting payment or completed after payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningOrderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /cleaner/orders/{order}:
    get:
      tags: [Cleaner Orders]
      summary: Get a confirmed available order or an assigned order with its checklist and selected extra services
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Cleaner order detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CleanerOrderDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /cleaner/orders/{order}/checklist/{item}:
    patch:
      tags: [Cleaner Orders]
      summary: Mark a base or selected extra-service checklist item as completed or incomplete
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - name: item
          in: path
          required: true
          schema: {type: string, description: "Base checklist item ID or extra-{orderLineItemId} for a selected extra service."}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [completed]
              properties:
                completed: {type: boolean}
      responses:
        '200':
          description: Updated shared checklist item
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: {$ref: '#/components/schemas/CleanerChecklistItem'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422': {$ref: '#/components/responses/ValidationError'}
  /cleaner/orders/{order}/accept:
    post:
      tags: [Cleaner Orders]
      summary: Join a confirmed order team
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order with an updated team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /cleaner/orders/{order}/start:
    post:
      tags: [Cleaner Orders]
      summary: Start a formed order team assignment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: In-progress order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /cleaner/orders/{order}/complete:
    post:
      tags: [Cleaner Orders]
      summary: Complete in-progress order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Completed order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /client/orders/{order}/cancel:
    post:
      tags: [Client Orders]
      summary: Cancel an order before its team is formed
      security: [{bearerAuth: []}]
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Cancelled order
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CleaningOrderResponse'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {$ref: '#/components/responses/Conflict'}
  /client/orders/{order}/payment:
    post:
      tags: [Payments]
      summary: Create or retrieve a T-Bank payment link for an order
      description: Available only to the order owner while the order status is awaiting_payment. The order is completed only after a signed T-Bank server notification with status CONFIRMED.
      security: [{bearerAuth: []}]
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: T-Bank hosted payment form link
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PaymentLinkResponse'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {$ref: '#/components/responses/Conflict'}
        '502': {description: T-Bank payment service is unavailable}
  /payments/tbank/notifications:
    post:
      tags: [Payments]
      summary: Receive a T-Bank payment status notification
      description: Server-to-server endpoint. It validates the T-Bank Token and returns plain text OK after processing a valid notification.
      security: []
      responses:
        '200': {description: Notification processed}
        '403': {description: Invalid T-Bank signature or terminal}
        '404': {description: Unknown payment attempt}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    OrderId:
      name: order
      in: path
      required: true
      schema:
        type: string
        description: Public order ULID
  responses:
    Unauthorized:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                message: Unauthenticated.
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Invalid order state transition
      content:
        application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  schemas:
    HomeSummary:
      type: object
      required: [active_orders_count, active_order_status, active_order_status_label]
      properties:
        active_orders_count: {type: integer, minimum: 0}
        active_order_status: {type: [string, 'null']}
        active_order_status_label: {type: [string, 'null']}
    ClientService:
      type: object
      required: [id, slug, title, cleaners_label, duration_label, gallery]
      properties:
        id: {type: string}
        slug: {type: string}
        title: {type: string}
        subtitle: {type: [string, 'null']}
        short_description: {type: [string, 'null']}
        cleaners_label: {type: string}
        duration_label: {type: string}
        price_from: {type: integer}
        image_url: {type: [string, 'null'], format: uri}
        gallery: {type: array, items: {type: string, format: uri}}
    ServiceOption:
      type: object
      required: [id, title, is_addon, default, price_modifier, sort_order]
      properties:
        id: {type: string}
        title: {type: string}
        subtitle: {type: [string, 'null']}
        is_addon: {type: boolean}
        default: {type: boolean}
        price_modifier: {type: integer}
        sort_order: {type: integer}
    ClientServiceDetail:
      allOf:
        - $ref: '#/components/schemas/ClientService'
        - type: object
          properties:
            description: {type: [string, 'null']}
            pricing: {type: object}
            checklist: {type: array, items: {$ref: '#/components/schemas/ServiceChecklistItem'}}
            checklist_sections: {type: array, items: {$ref: '#/components/schemas/ClientChecklistSection'}}
            room_options: {type: array, items: {$ref: '#/components/schemas/ServiceOption'}}
            cleaning_options: {type: array, items: {$ref: '#/components/schemas/ServiceOption'}}
            extra_options: {type: array, items: {$ref: '#/components/schemas/ServiceOption'}}
    CreateOrderRequest:
      type: object
      required: [service_id, extra_option_ids, address, scheduled_at]
      properties:
        service_id: {type: string}
        room_option_id: {type: [string, 'null']}
        cleaning_option_id: {type: [string, 'null']}
        extra_option_ids: {type: array, uniqueItems: true, items: {type: string}}
        scheduled_at: {type: string, format: date-time, description: "UTC is assumed when the ISO 8601 value has no offset."}
        payment_method: {type: ['null', string]}
        address:
          type: object
          required: [full_address]
          properties:
            full_address: {type: string, minLength: 3, maxLength: 255}
            entrance: {type: [string, 'null'], maxLength: 50}
            floor: {type: [string, 'null'], maxLength: 50}
            apartment: {type: [string, 'null'], maxLength: 50}
            intercom: {type: [string, 'null'], maxLength: 50}
            comment: {type: [string, 'null'], maxLength: 2000}
    CreateOrderResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, status, status_label, scheduled_at, total_price, currency, service, created_at]
          properties:
            id: {type: string}
            status: {type: string, enum: [processing]}
            status_label: {type: string}
            scheduled_at: {type: string, format: date-time}
            total_price: {type: integer, minimum: 0}
            currency: {type: string, enum: [RUB]}
            service:
              type: object
              required: [id, title]
              properties:
                id: {type: string}
                title: {type: string}
    PaymentLinkResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, payment_url, expires_at, status]
          properties:
            id: {type: string, description: T-Bank merchant OrderId}
            payment_url: {type: string, format: uri}
            expires_at: {type: string, format: date-time}
            status: {type: string, enum: [pending]}
            created_at: {type: string, format: date-time}
    PhoneRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          maxLength: 32
          example: '+79990000001'
    ClientVerifyCodeRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
          maxLength: 32
        code:
          type: string
          pattern: '^\d{4}$'
          example: '4829'
    CleanerLoginRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
          maxLength: 32
        code:
          type: string
          pattern: '^\d{6}$'
          example: '111111'
    UpdateClientProfileRequest:
      type: object
      properties:
        name:
          type:
            - string
            - 'null'
          maxLength: 255
        email:
          type:
            - string
            - 'null'
          format: email
          maxLength: 255
        address:
          type:
            - string
            - 'null'
          maxLength: 255
        push_notifications_enabled:
          type: boolean
        email_marketing_enabled:
          type: boolean
    PushTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          maxLength: 4096
          description: Firebase Cloud Messaging registration token for the current device.
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    AuthTokenResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
    CleaningOrderResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/CleaningOrder'
    CleaningOrderListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CleaningOrder'
    User:
      type: object
      required: [id, role]
      properties:
        id:
          type: integer
        name:
          type:
            - string
            - 'null'
        email:
          type:
            - string
            - 'null'
          format: email
        phone:
          type:
            - string
            - 'null'
          readOnly: true
        role:
          type: string
          enum: [client, cleaner, admin]
        client_profile:
          oneOf:
            - $ref: '#/components/schemas/ClientProfile'
            - type: 'null'
        cleaner_profile:
          oneOf:
            - $ref: '#/components/schemas/CleanerProfile'
            - type: 'null'
    ClientProfile:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type:
            - string
            - 'null'
        address:
          type:
            - string
            - 'null'
        push_notifications_enabled:
          type: boolean
        email_marketing_enabled:
          type: boolean
    CleanerProfile:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type:
            - string
            - 'null'
        is_active:
          type: boolean
    CleaningService:
      type: object
      required: [id, name, base_price, is_active]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type:
            - string
            - 'null'
        base_price:
          type: integer
          minimum: 0
        cleaner_base_earnings:
          type: integer
          minimum: 0
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CleaningOrder:
      type: object
      required: [id, client_id, cleaning_service_id, status, address, total_price]
      properties:
        id:
          type: integer
        client_id:
          type: integer
        cleaners:
          type: array
          items:
            $ref: '#/components/schemas/User'
        cleaning_service_id:
          type: integer
        status:
          type: string
          enum: [processing, confirmed, team_formed, in_progress, awaiting_payment, completed, cancelled]
        address:
          type: string
        scheduled_at:
          type:
            - string
            - 'null'
          format: date-time
        comment:
          type:
            - string
            - 'null'
        total_price:
          type: integer
          minimum: 0
        cleaner_earnings:
          type: integer
          minimum: 0
          description: Cleaner share in rubles. For available orders, the expected share after the current cleaner joins.
        service:
          oneOf:
            - $ref: '#/components/schemas/CleaningService'
            - type: 'null'
    CleanerOrderDetail:
      type: object
      required: [id, status, status_label, scheduled_at, total_price, cleaner_earnings, currency, service, address, line_items, extra_options, checklist]
      properties:
        id: {type: string}
        status: {type: string, enum: [processing, confirmed, team_formed, in_progress, awaiting_payment, completed, cancelled]}
        status_label: {type: string}
        scheduled_at: {type: string, format: date-time}
        total_price: {type: integer}
        cleaner_earnings: {type: integer, minimum: 0, description: "Cleaner share in rubles"}
        currency: {type: string, enum: [RUB]}
        service: {type: object}
        address: {type: object}
        line_items:
          type: array
          items: {$ref: '#/components/schemas/OrderLineItem'}
        extra_options:
          type: array
          items: {$ref: '#/components/schemas/OrderLineItem'}
        checklist:
          type: array
          items: {$ref: '#/components/schemas/CleanerChecklistItem'}
        checklist_sections:
          type: array
          items: {$ref: '#/components/schemas/CleanerChecklistSection'}
    ServiceChecklistItem:
      type: object
      required: [id, zone, title, sort_order]
      properties:
        id: {type: integer}
        zone: {type: string, enum: [all, rooms, kitchen, bathroom]}
        title: {type: string}
        sort_order: {type: integer}
    ClientChecklistSection:
      type: object
      required: [id, title, items]
      properties:
        id: {type: string, enum: [all, rooms, kitchen, bathroom]}
        title: {type: string}
        items: {type: array, items: {$ref: '#/components/schemas/ServiceChecklistItem'}}
    CleanerChecklistItem:
      type: object
      required: [id, kind, zone, title, sort_order, completed, completed_at]
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
        kind: {type: string, enum: [base_service, extra_service]}
        zone: {type: string, enum: [all, rooms, kitchen, bathroom]}
        title: {type: string}
        sort_order: {type: integer}
        completed: {type: boolean}
        completed_at: {type: [string, 'null'], format: date-time}
    CleanerChecklistSection:
      type: object
      required: [id, title, items]
      properties:
        id: {type: string, enum: [all, rooms, kitchen, bathroom]}
        title: {type: string}
        items: {type: array, items: {$ref: '#/components/schemas/CleanerChecklistItem'}}
    OrderLineItem:
      type: object
      required: [kind, title, amount]
      properties:
        kind: {type: string}
        option_id: {type: [string, 'null']}
        title: {type: string}
        amount: {type: integer}
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    ValidationErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
